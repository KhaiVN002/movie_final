services:

  backend:
    build:
      context: ./backend-springboot
      dockerfile: Dockerfile
    container_name: mv-be
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  angular-dev:
    build:
      context: ./frontend-angular
      dockerfile: Dockerfile
    container_name: mv-fe
    ports:
      - "4200:4200"

    volumes:
      - ./frontend-angular:/app
      - /app/node_modules

    environment:
      CHOKIDAR_USEPOLLING: "true"

    command: npm start -- --host 0.0.0.0

  postgres:
    image: postgres:17-alpine
    container_name: mv-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Ho_Chi_Minh
      PGTZ: Asia/Ho_Chi_Minh
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=vi-VN"
    command: >
      postgres -c timezone=Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: mv-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--requirepass", "redispassword"]

volumes:
  postgres_data:
  redis_data: