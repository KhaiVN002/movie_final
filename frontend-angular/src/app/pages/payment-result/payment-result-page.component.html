<loading-overlay
    [active]="status === 'loading'"
></loading-overlay>
<div class="container">
    <div class="wrapper">
        <p *ngIf="status === 'success'" class="content">
            Chúc mừng bạn đã thanh toán thành công.
        </p>
        <p *ngIf="status === 'fail'" class="content">
            Thanh toán thất bại.
        </p>
        <div>
            <ng-container *ngIf="status === 'success'">
                <a class="note" [routerLink]="['/my-tickets']">Xem vé của tôi</a>
                <span> hoặc </span>
            </ng-container>
            <a class="note" [routerLink]="['/home']">Quay lại trang chủ</a>
        </div>
    </div>
</div>
